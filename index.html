<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Project Lemonade</title>
        <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
        <link rel="icon" href="/favicon.ico" type="image/x-icon" />
        <link href="style.css" rel="stylesheet" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <!-- Essential for correct mobile scaling -->
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    </head>
    <body class="m-0 h-screen w-screen overflow-hidden">
        <div
            class="grid h-screen w-screen grid-rows-[60vh_40vh] md:grid-rows-1 md:grid-cols-[1fr_200px]"
        >
            <div
                id="canvas-container"
                class="min-h-0 min-w-0 bg-[radial-gradient(circle_at_top_left,_#ffffff_0%,_#fff8d2_100%)]"
            ></div>

            <!-- UI Panel: Bottom drawer on mobile, Sidebar on desktop -->
            <div
                id="ui-panel"
                class="min-h-0 overflow-x-auto bg-white border-t md:border-t-0 md:border-l border-slate-200 flex flex-row md:flex-col"
            >
                <!-- Eye Grid Block -->
                <div
                    class="flex flex-col items-center min-w-[100px] md:w-full md:flex-grow overflow-y-auto border-r md:border-r-0 md:border-b border-slate-100 pr-4 md:pr-0 md:pb-4 md:px-2"
                >
                    <span
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 sticky top-0 bg-white/95 w-full text-center"
                        >Eye Files</span
                    >
                    <div
                        id="eye-grid"
                        class="grid grid-cols-2 gap-2 w-full px-1"
                    >
                        <!-- Buttons are injected here dynamically by JavaScript -->
                    </div>
                </div>

                <!-- Mouth Grid Block -->
                <div
                    class="flex flex-col items-center min-w-[100px] md:w-full md:flex-grow overflow-y-auto border-r md:border-r-0 md:border-b border-slate-100 pr-4 md:pr-0 md:pb-4 md:px-2"
                >
                    <span
                        class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-2 sticky top-0 bg-white/95 w-full text-center"
                        >Mouth Files</span
                    >
                    <div
                        id="mouth-grid"
                        class="grid grid-cols-2 gap-2 w-full px-1"
                    >
                        <!-- Buttons are injected here dynamically by JavaScript -->
                    </div>
                </div>

                <div class="p-2 text-center flex flex-col">
                    <!-- Slider Block: Adjust Eyes -->
                    <div
                        class="flex flex-1 flex-col items-center min-w-[120px] md:w-full md:pb-4 md:px-2 gap-3 justify-center md:justify-start"
                    >
                        <span
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-wider"
                            >Adjust Eyes</span
                        >

                        <div
                            class="w-full flex flex-col text-xs text-slate-600"
                        >
                            <label class="font-medium mb-1">Size</label>
                            <input
                                type="range"
                                id="eye-scale"
                                min="0.5"
                                max="2.0"
                                step="0.1"
                                value="1.0"
                                class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
                            />
                        </div>

                        <div
                            class="w-full flex flex-col text-xs text-slate-600"
                        >
                            <label class="font-medium mb-1">Height (Y)</label>
                            <input
                                type="range"
                                id="eye-y"
                                min="-0.6"
                                max="0.6"
                                step="0.05"
                                value="0.1"
                                class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
                            />
                        </div>
                    </div>

                    <!-- Slider Block: Adjust Mouth -->
                    <div
                        class="mt-4 flex flex-1 flex-col items-center min-w-[120px] md:w-full md:pb-4 md:px-2 gap-3 justify-center md:justify-start"
                    >
                        <span
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-wider"
                            >Adjust Mouth</span
                        >

                        <div
                            class="w-full flex flex-col text-xs text-slate-600"
                        >
                            <label class="font-medium mb-1">Size</label>
                            <input
                                type="range"
                                id="mouth-scale"
                                min="0.2"
                                max="2"
                                step="0.1"
                                value="1"
                                class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
                            />
                        </div>

                        <div
                            class="w-full flex flex-col text-xs text-slate-600"
                        >
                            <label class="font-medium mb-1">Height (Y)</label>
                            <input
                                type="range"
                                id="mouth-y"
                                min="-0.6"
                                max="0.6"
                                step="0.05"
                                value="-0.25"
                                class="w-full h-1 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500"
                            />
                        </div>
                    </div>
                    <div class="py-2 px-1 flex-1">
                        <button
                            class="text-white w-full bg-indigo-400 hover:bg-indigo-300 rounded-md p-1"
                            id="btn-screenshot"
                            type="button"
                        >
                            Save Image
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <script type="module" src="/main.js"></script>
    </body>
</html>
